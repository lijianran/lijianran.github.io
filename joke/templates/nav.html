<!-- 导航栏 -->
<div class="nav">
    <img src="/stt/img/logo.png"/>

    <ul>
        {% for item in nav %}
        <li>
            <a href="...">·{{ item }}</a>
        </li>
        {% endfor %}
    </ul>
</div>

{% if person.sex == "male" %}
    {% if person.age <= 18 %}
    <span>Hello, boy!</span>
    {% else %}
    <span>Hello, man!</span>
    {% endif %}
{% else %}
    {% if person.age <= 18 %}
    <span>Hello, girl!</span>
    {% else %}
    <span>Hello, lady!</span>
    {% endif %}
{% endif %}
